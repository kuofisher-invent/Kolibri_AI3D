<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="gBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#CFE8FF"/>
      <stop offset="55%" stop-color="#6EB4FF"/>
      <stop offset="100%" stop-color="#2E73C8"/>
    </linearGradient>
    <linearGradient id="gGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE28A"/>
      <stop offset="60%" stop-color="#F5B93D"/>
      <stop offset="100%" stop-color="#C98A12"/>
    </linearGradient>
    <linearGradient id="gRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFB0A8"/>
      <stop offset="55%" stop-color="#F56857"/>
      <stop offset="100%" stop-color="#BC2E22"/>
    </linearGradient>
    <linearGradient id="gSilver" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7FBFF"/>
      <stop offset="60%" stop-color="#B8C7D9"/>
      <stop offset="100%" stop-color="#7A8A9D"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0.8" dy="1.2" stdDeviation="1.1" flood-color="#0A1A2C" flood-opacity="0.55"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0.5" dy="0.8" stdDeviation="0.7" flood-color="#0A1A2C" flood-opacity="0.4"/>
    </filter>
    <style>
      .b{fill:url(#gBlue);stroke:#DDF0FF;stroke-width:1.5;stroke-linejoin:round;stroke-linecap:round;filter:url(#shadow)}
      .g{fill:url(#gGold);stroke:#FFF0B4;stroke-width:1.2;stroke-linejoin:round;stroke-linecap:round;filter:url(#soft)}
      .s{fill:url(#gSilver);stroke:#FFFFFF;stroke-width:1.2;stroke-linejoin:round;stroke-linecap:round;filter:url(#soft)}
      .r{fill:url(#gRed);stroke:#FFD3CF;stroke-width:1.2;stroke-linejoin:round;stroke-linecap:round;filter:url(#soft)}
      .ol{stroke:#DDF0FF;stroke-width:2.6;stroke-linejoin:round;stroke-linecap:round;filter:url(#soft)}
      .gl{stroke:url(#gGold);stroke-width:3;stroke-linejoin:round;stroke-linecap:round;filter:url(#soft);fill:none}
      .bl{stroke:url(#gBlue);stroke-width:3;stroke-linejoin:round;stroke-linecap:round;filter:url(#soft);fill:none}
      .sl{stroke:url(#gSilver);stroke-width:3;stroke-linejoin:round;stroke-linecap:round;filter:url(#soft);fill:none}
      .txt{font-family:Arial, Helvetica, sans-serif;font-size:15px;font-weight:700;fill:#F7FBFF;paint-order:stroke;stroke:#284A72;stroke-width:2px;stroke-linejoin:round}
      .txt2{font-family:Arial, Helvetica, sans-serif;font-size:13px;font-weight:700;fill:#FFD367;paint-order:stroke;stroke:#654100;stroke-width:2px;stroke-linejoin:round}
      .dash{stroke:#FFD367;stroke-width:2.3;stroke-dasharray:5 4;stroke-linecap:round;filter:url(#soft);fill:none}
    </style>
  </defs>
  
<path class="s" d="M18 24 L32 16 L46 24 L32 32 Z"/>
<path class="s" d="M18 24 V40 L32 48 V32 Z"/>
<path class="dash" d="M46 24 V40 L32 48"/>

</svg>